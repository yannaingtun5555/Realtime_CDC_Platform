networks:
  cdc-net:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cdc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cdc-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cdc-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9093"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s  
    networks:
      - cdc-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: cdc-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    networks:
      - cdc-net

  kafka-connect:
    image: debezium/connect:2.5.0.Final
    container_name: cdc-kafka-connect
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "cdc-connect-group"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - cdc-net
    
  minio:
    image: minio/minio:latest
    container_name: cdc-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - cdc-net

  init-minio:
    image: minio/mc:latest
    container_name: cdc-init-minio
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO API to respond...' &&
      while ! mc alias set local http://minio:9000 minioadmin minioadmin123 2>/dev/null; do 
        sleep 1; 
      done &&
      echo 'MinIO is up. Configuration alias set.' &&
      echo 'Creating Buckets...' &&
      mc mb local/iceberg-warehouse --ignore-existing &&
      mc mb local/flink-checkpoints --ignore-existing &&
      mc mb local/flink-savepoints --ignore-existing &&
      echo 'Buckets created successfully.' &&
      exit 0
      "
    networks:
      - cdc-net

  flink-jobmanager:
    build: ./flink
    container_name: cdc-flink-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PYTHON_EXECUTABLE: python3
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      S3_ENDPOINT: http://minio:9000
      CONFIG_PATH: /opt/flink/config.json
      FLINK_PROPERTIES: |
        state.checkpoints.subdirectory.job-id: false
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.allowed-fallback-filesystems: s3a
        fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
        state.backend: filesystem
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
    volumes:
      # - ./data/flink-checkpoints:/opt/flink/checkpoints   # removed for S3
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/usrlib:/opt/flink/usrlib
      - ./config.json:/opt/flink/config.json:ro
    networks:
      - cdc-net
    depends_on:
      - minio
      - kafka

  flink-taskmanager:
    build: ./flink
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PYTHON_EXECUTABLE: python3
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      S3_ENDPOINT: http://minio:9000
      CONFIG_PATH: /opt/flink/config.json
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLINK_PROPERTIES: |
        state.checkpoints.subdirectory.job-id: false
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.allowed-fallback-filesystems: s3a
        fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
        state.backend: filesystem
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/usrlib:/opt/flink/usrlib
      - ./config.json:/opt/flink/config.json:ro
    networks:
      - cdc-net
    scale: 2

  topic-automation:
    build: ./scripts/deployment/automation
    container_name: cdc-topic-automation
    command: ["python", "-u", "01_topic_creation.py"]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      CONFIG_PATH: /opt/automation/config.json
    volumes:
      - ./config.json:/opt/automation/config.json:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - cdc-net
    restart: "no"

  connector-automation:
    build: ./scripts/deployment/automation
    container_name: cdc-connector-automation
    command: ["python", "-u", "02_register_connectors.py"]
    environment:
      CONNECT_URL: http://kafka-connect:8083
      DB_CONFIG_PATH: /opt/automation/dbconfig.json
      CONNECTORS_DIR: /opt/automation/connectors
    volumes:
      - ./dbconfig.json:/opt/automation/dbconfig.json:ro
      - ./connectors:/opt/automation/connectors:ro
    depends_on:
      kafka-connect:
        condition: service_healthy
      topic-automation:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - cdc-net
    restart: "no"
      
  job-submitter:
    build: ./flink
    container_name: cdc-job-submitter
    depends_on:
      flink-jobmanager:
        condition: service_started
      kafka:
        condition: service_started
      connector-automation:
        condition: service_completed_successfully
    environment:
      FLINK_REST_API: http://flink-jobmanager:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONFIG_PATH: /opt/job-submitter/config.json
      SAVEPOINT_BASE_DIR: s3a://flink-savepoints
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    volumes:
      - ./config.json:/opt/flink/config.json:ro
      - ./config.json:/opt/job-submitter/config.json:ro
      - ./scripts/deployment/job_submitter/submitter.py:/opt/flink/submitter.py:ro
      - ./flink/jobs:/opt/flink/jobs
      # - ./flink/jars:/opt/flink/jars   ← REMOVE THIS LINE
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cdc-net
    restart: "no"
    command: python /opt/flink/submitter.py
    

  job-watcher:
    build: ./flink
    container_name: cdc-job-watcher
    entrypoint: ""                           # clears the default entrypoint
    command: python -u /opt/flink/jobs/job_watcher.py
    environment:
      - PYTHONUNBUFFERED=1
      - JOB_CONFIG_FILE=/opt/flink/config.json
      - SAVEPOINT_BASE_DIR=s3a://flink-savepoints
      - SAVEPOINT_INTERVAL_SECONDS=300
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
    volumes:
      - ./flink/jobs:/opt/flink/jobs
      - ./flink/watcher-conf:/opt/flink/watcher-conf
      - ./config.json:/opt/flink/config.json:ro
    depends_on:
      job-submitter:
        condition: service_completed_successfully  
    networks:
      - cdc-net
    restart: always
    

  pipeline-watcher:
    build: ./scripts/deployment/pipeline_watcher
    container_name: cdc-pipeline-watcher
    environment:
      FLINK_REST_API: http://flink-jobmanager:8081
      CONFIG_PATH: /app/config.json
      CHECK_INTERVAL_SECONDS: 30
      SCALE_COOLDOWN_SECONDS: 300
      COMPOSE_PROJECT: streamlakecdc
      COMPOSE_FILE: /workspace/docker-compose.yml
      COMPOSE_PROJECT_DIRECTORY: /workspace
      MIN_TASKMANAGERS: 1
      MAX_TASKMANAGERS: 4
    volumes:
      - ./config.json:/app/config.json:ro
      - .:/workspace:ro
      - /var/run/docker.sock:/var/run/docker.sock   # to control Docker Compose
    networks:
      - cdc-net
    restart: always
    depends_on:
      - flink-jobmanager
      - flink-taskmanager

  postgres:
    image: postgres:15
    container_name: cdc-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inventory
      POSTGRES_CONF_ARGS: >
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
    ports:
      - "5432:5432"
    networks:
      - cdc-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  data-injector:
    build: ./tests/integration
    container_name: cdc-data-injector
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: inventory
      INJECT_INTERVAL_SECONDS: 10
    depends_on:
      postgres:
        condition: service_healthy
      connector-automation:
        condition: service_completed_successfully
    networks:
      - cdc-net
    restart: unless-stopped

  e2e-test:
    build: ./tests/e2e
    container_name: cdc-e2e-test
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONNECT_URL: http://kafka-connect:8083
      FLINK_REST_API: http://flink-jobmanager:8081
      CONNECTOR_NAME: debezium-inventory-connector
      FLINK_JOB_NAME: CDC Capture Job
      CDC_TOPIC: cdc.inventory.customers
      CAPTURE_TOPIC: internal.capture
      OUTPUT_TOPIC: internal.enriched
      WAIT_TIMEOUT_SECONDS: 120
      ENRICH_TIMEOUT_SECONDS: 90
    depends_on:
      kafka:
        condition: service_started
      kafka-connect:
        condition: service_healthy
      connector-automation:
        condition: service_completed_successfully
      job-submitter:
        condition: service_completed_successfully
      data-injector:
        condition: service_started
      flink-jobmanager:
        condition: service_started
    networks:
      - cdc-net
    restart: "no"

volumes:
  minio_data:
    driver: local
  flink-checkpoints:
    driver: local
