networks:
  cdc-net:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cdc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cdc-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cdc-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
        
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    networks:
      - cdc-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: cdc-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    networks:
      - cdc-net

  kafka-connect:
    image: debezium/connect:2.5.0.Final
    container_name: cdc-kafka-connect
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: "cdc-connect-group"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
    networks:
      - cdc-net
    
  minio:
    image: minio/minio:latest
    container_name: cdc-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - cdc-net

  init-minio:
    image: minio/mc:latest
    container_name: cdc-init-minio
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO API...' &&
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb local/iceberg-warehouse --ignore-existing &&
      mc mb local/flink-checkpoints --ignore-existing &&
      mc mb local/flink-savepoints --ignore-existing &&
      echo 'Buckets created successfully.' &&
      exit 0
      "
    networks:
      - cdc-net

  flink-jobmanager:
    build: ./flink
    container_name: cdc-flink-jobmanager
    command: jobmanager  
    ports:
      - "8082:8081"   # Flink Web UI
    environment:
      ENABLE_BUILT_IN_PLUGINS: true
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PYTHON_EXECUTABLE: python3
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.memory.process.size: 1600m
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 2
        fs.s3a.endpoint: http://minio:9000
        fs.s3a.access.key: minioadmin
        fs.s3a.secret.key: minioadmin123
        fs.s3a.path.style.access: true
        fs.s3a.connection.ssl.enabled: false
        fs.allowed-fallback-filesystems: s3a
        state.backend: rocksdb
        state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
        state.savepoints.dir: s3a://flink-savepoints/savepoints
    volumes:
      - ./flink/usrlib:/opt/flink/usrlib      # for custom JARs
      - ./flink/conf:/opt/flink/conf          # optional overrides
      - ./flink/jobs:/opt/flink/jobs          # PyFlink jobs submitted by job-submitter
    networks:
      - cdc-net
    depends_on:
      - minio
      - kafka

  flink-taskmanager:
    build: ./flink
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      FLINK_PYTHON_EXECUTABLE: python3
      FLINK_PROPERTIES: |
          jobmanager.rpc.address: flink-jobmanager
          taskmanager.numberOfTaskSlots: 2
          parallelism.default: 2
          fs.s3a.endpoint: http://minio:9000
          fs.s3a.access.key: minioadmin
          fs.s3a.secret.key: minioadmin123
          fs.s3a.path.style.access: true
          fs.s3a.connection.ssl.enabled: false
          fs.allowed-fallback-filesystems: s3a
          state.backend: rocksdb
          state.checkpoints.dir: s3a://flink-checkpoints/checkpoints
    volumes:
      - ./flink/usrlib:/opt/flink/usrlib
      - ./flink/jobs:/opt/flink/jobs
    networks:
      - cdc-net
    scale: 2   

  flink-sql-client:
    image: flink:1.18.1-scala_2.12-java11
    container_name: cdc-flink-sql-client
    depends_on:
      - flink-jobmanager
    environment:
     FLINK_PROPERTIES: |
          fs.s3a.endpoint: http://minio:9000
          fs.s3a.access.key: minioadmin
          fs.s3a.secret.key: minioadmin123
          fs.s3a.path.style.access: true
    command: /opt/flink/bin/sql-client.sh
    stdin_open: true
    tty: true
    networks:
      - cdc-net

  automation:
    build: ./scripts/deployment/topic_create
    container_name: cdc-automation
    depends_on:
      - kafka
    networks:
      - cdc-net
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      
  job-submitter:
    build: ./scripts/deployment/job_submmit
    container_name: cdc-job-submitter
    depends_on:
      - flink-jobmanager
      - kafka
    environment:
      - FLINK_JOBMANAGER_CONTAINER=cdc-flink-jobmanager
      - KAFKA_CONTAINER=cdc-kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FLINK_CLASSPATH_JARS=/opt/flink/lib/flink-connector-kafka-3.2.0-1.18.jar,/opt/flink/lib/kafka-clients-3.7.0.jar
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # mount Docker socket
      - ./flink/jobs:/opt/flink/jobs                 # share job scripts
    networks:
      - cdc-net
    restart: "no"   # run once and exit
volumes:
  minio_data:
    driver: local
